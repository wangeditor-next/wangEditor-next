name: Unit Test

on:
  push:
    branches:
      - 'master'
      - 'dev'
      - 'dev-*'
      - 'dev/**'
      - 'feature-*'
      - 'feature/**'
      - 'fix-*'
      - 'fix/**'
      - 'hotfix-*'
      - 'hotfix/**'
      - 'refactor-*'
      - 'refactor/**'
      - 'test-*'
      - 'test/**'
    paths:
      - '.github/workflows/*'
      - 'packages/**'
      - 'tests/**'
      - 'build/**'
      - 'vitest.config.mts'
  pull_request:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['20.19.0', '22.13.0']

    steps:
      # 检出代码库
      - name: Checkout repo
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # 安装 pnpm
      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9.15.0

      # 设置 Node.js 版本并缓存 pnpm store
      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node-version }}
          registry-url: https://registry.npmjs.com
          cache: pnpm

      # 安装依赖
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check compatibility inventory
        run: pnpm run check:compatibility

      # Full lint gate
      - name: Lint
        run: pnpm lint

      # 构建项目
      - name: Build packages
        run: pnpm build

      - name: Check editor package size budget
        run: pnpm run check:editor:pack-size

      # 在 master 上顺带产出覆盖率，避免额外 workflow 重复跑一轮
      - name: Unit test with coverage
        if: matrix.node-version == '22.13.0' && (github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref_name == 'master'))
        run: pnpm run test-c

      - name: Unit test
        if: matrix.node-version != '22.13.0' || (github.event_name != 'workflow_dispatch' && !(github.event_name == 'push' && github.ref_name == 'master'))
        run: pnpm run test

      - name: Upload coverage reports to Codecov
        if: matrix.node-version == '22.13.0' && (github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref_name == 'master'))
        uses: codecov/codecov-action@v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/lcov.info
          disable_search: true
          verbose: true

  test:
    name: test
    if: always()
    needs: unit-tests
    runs-on: ubuntu-latest
    steps:
      - name: Require all unit test jobs to pass
        run: test "${{ needs.unit-tests.result }}" = 'success'
