name: Demo Smoke Test

on:
  push:
    branches:
      - 'master'
      - 'dev'
      - 'dev-*'
      - 'dev/**'
      - 'feature-*'
      - 'feature/**'
      - 'fix-*'
      - 'fix/**'
      - 'hotfix-*'
      - 'hotfix/**'
      - 'refactor-*'
      - 'refactor/**'
      - 'test-*'
      - 'test/**'
    paths:
      - '.github/workflows/*'
      - 'apps/**'
      - 'packages/editor/**'
      - 'packages/editor-for-react/**'
      - 'packages/yjs/**'
      - 'packages/yjs-for-react/**'
      - 'packages/yjs-for-vue/**'
      - 'package.json'
      - 'pnpm-workspace.yaml'
      - 'pnpm-lock.yaml'
      - 'turbo.json'
  pull_request:
    branches:
      - master
    paths:
      - '.github/workflows/*'
      - 'apps/**'
      - 'packages/editor/**'
      - 'packages/editor-for-react/**'
      - 'packages/yjs/**'
      - 'packages/yjs-for-react/**'
      - 'packages/yjs-for-vue/**'
      - 'package.json'
      - 'pnpm-workspace.yaml'
      - 'pnpm-lock.yaml'
      - 'turbo.json'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.13.0
          registry-url: https://registry.npmjs.com
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Demo smoke tests
        run: pnpm run smoke:demos
