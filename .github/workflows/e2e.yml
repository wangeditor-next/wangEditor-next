name: E2E Test

on:
  push:
    branches:
      - 'master'
      - 'dev'
      - '^(dev-.*|dev/.*)$'
      - '^(feature-.*|feature/.*)$'
      - '^(fix-.*|fix/.*)$'
      - '^(hotfix-.*|hotfix/.*)$'
      - '^(refactor-.*|refactor/.*)$'
      - '^(test-.*|test/.*)$'
    paths:
      - '.github/workflows/*'
      - 'packages/**'
      - 'scripts/**'
      - 'tests/**'
      - 'build/**'
      - 'babel.config.json'
      - 'package.json'
      - 'playwright.config.ts'
  pull_request:
    branches:
      - master

jobs:
  test-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # 设置 Node.js 版本
      - name: Use Node.js 22.13.0
        uses: actions/setup-node@v6
        with:
          node-version: '22.13.0'

      # 安装 pnpm
      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9.15.0

      # 加载依赖缓存
      - name: Load cached dependencies
        uses: actions/cache@v5.0.3
        id: cache
        with:
          path: |
            **/node_modules
            **/.turbo
            /home/runner/.cache/ms-playwright
            ~/.pnpm-store
          key: ${{ runner.os }}-node-22.13.0-${{ hashFiles('**/pnpm-lock.yaml') }}


      # 安装项目依赖
      - name: Install dependencies
        run: pnpm install

      # 先构建 editor 及其依赖，避免把冷构建时间算进 Playwright webServer 超时
      - name: Build editor packages
        run: pnpm turbo build --filter=@wangeditor-next/editor

      # 安装 Playwright 浏览器和系统依赖
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      # 运行 Playwright 测试
      - name: Run E2E tests
        env:
          PLAYWRIGHT_SKIP_BUILD: '1'
        run: pnpm e2e
