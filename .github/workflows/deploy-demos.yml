# This workflow will do a clean install of node dependencies, build the source code and run tests across different versions of node
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions
# github actions 中文文档 https://docs.github.com/cn/actions/getting-started-with-github-actions

name: Deploy Demos

on:
  push:
    branches:
      - master
    paths:
      - 'packages/editor/demo/**'
      - '.github/workflows/deploy-demos.yml'
  workflow_dispatch:

concurrency:
  group: deploy-demos
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEMO_REPO_TOKEN: ${{ secrets.DEMO_REPO_TOKEN || secrets.DEMO_TEMPLATES_TOKEN }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - name: Verify deploy token
        run: |
          if [ -z "$DEMO_REPO_TOKEN" ]; then
            echo "::error::Missing deploy token. Set DEMO_REPO_TOKEN (preferred) or DEMO_TEMPLATES_TOKEN."
            exit 1
          fi

      - name: Checkout demo deployment repo
        uses: actions/checkout@v7
        with:
          repository: wangeditor-next/demo
          ref: main
          token: ${{ env.DEMO_REPO_TOKEN }}
          path: demo-repo

      - name: Sync demo files
        run: |
          rsync -av --exclude '.git/' ./packages/editor/demo/ ./demo-repo/

      - name: Commit and push
        working-directory: demo-repo
        env:
          SOURCE_SHA: ${{ github.sha }}
        run: |
          if git diff --quiet; then
            echo "No demo changes to publish."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore: sync demo from wangEditor-next@${SOURCE_SHA::7}"
          git push origin HEAD:main
